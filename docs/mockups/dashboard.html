<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ダッシュボード</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<div class="flex h-screen">
  <!-- サイドバー -->
  <aside class="w-56 bg-white border-r border-gray-200 flex flex-col">
    <div class="h-14 flex items-center px-4 border-b border-gray-200">
      <div class="w-7 h-7 bg-blue-600 rounded-full flex items-center justify-center mr-2">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
      </div>
      <span class="font-bold text-sm text-gray-800">AI CallCenter</span>
    </div>
    <nav class="flex-1 py-4">
      <a class="flex items-center px-4 py-2.5 text-sm bg-blue-50 text-blue-700 border-r-2 border-blue-700">
        <span class="mr-3">📊</span>ダッシュボード
      </a>
      <a class="flex items-center px-4 py-2.5 text-sm text-gray-600 hover:bg-gray-50">
        <span class="mr-3">📞</span>架電画面
      </a>
      <a class="flex items-center px-4 py-2.5 text-sm text-gray-600 hover:bg-gray-50">
        <span class="mr-3">🔔</span>リコール管理
      </a>
      <a class="flex items-center px-4 py-2.5 text-sm text-gray-600 hover:bg-gray-50">
        <span class="mr-3">📁</span>案件管理
      </a>
      <a class="flex items-center px-4 py-2.5 text-sm text-gray-600 hover:bg-gray-50">
        <span class="mr-3">📋</span>通話ログ
      </a>
      <a class="flex items-center px-4 py-2.5 text-sm text-gray-600 hover:bg-gray-50">
        <span class="mr-3">📥</span>CSVインポート
      </a>
    </nav>
    <div class="border-t border-gray-200 p-4">
      <p class="text-sm font-medium text-gray-800">田中 太郎</p>
      <p class="text-xs text-gray-500">operator</p>
    </div>
  </aside>

  <!-- メイン -->
  <main class="flex-1 overflow-auto p-6">
    <h1 class="text-lg font-bold text-gray-800 mb-4">ダッシュボード</h1>

    <!-- KPIカード -->
    <div class="grid grid-cols-7 gap-3 mb-6">
      <div class="bg-white rounded-lg border border-gray-200 p-4">
        <p class="text-xs text-gray-500 mb-1">稼働時間</p>
        <p class="text-2xl font-bold text-blue-600">247分</p>
      </div>
      <div class="bg-white rounded-lg border border-gray-200 p-4">
        <p class="text-xs text-gray-500 mb-1">コール数</p>
        <p class="text-2xl font-bold text-blue-600">68</p>
      </div>
      <div class="bg-white rounded-lg border border-gray-200 p-4">
        <p class="text-xs text-gray-500 mb-1">リコール獲得</p>
        <p class="text-2xl font-bold text-green-600">12</p>
      </div>
      <div class="bg-white rounded-lg border border-gray-200 p-4">
        <p class="text-xs text-gray-500 mb-1">リコール消化</p>
        <p class="text-2xl font-bold text-green-600">8</p>
      </div>
      <div class="bg-white rounded-lg border border-gray-200 p-4">
        <p class="text-xs text-gray-500 mb-1">有効接続</p>
        <p class="text-2xl font-bold text-yellow-600">23</p>
      </div>
      <div class="bg-white rounded-lg border border-gray-200 p-4">
        <p class="text-xs text-gray-500 mb-1">担当接続</p>
        <p class="text-2xl font-bold text-purple-600">15</p>
      </div>
      <div class="bg-white rounded-lg border border-gray-200 p-4">
        <p class="text-xs text-gray-500 mb-1">案件獲得</p>
        <p class="text-2xl font-bold text-red-600">3</p>
      </div>
    </div>

    <!-- グラフエリア -->
    <div class="grid grid-cols-2 gap-6">
      <!-- 時間帯別コール数 -->
      <div class="bg-white rounded-lg border border-gray-200 p-4">
        <h2 class="text-sm font-bold text-gray-700 mb-3">時間帯別コール数</h2>
        <div class="flex items-end space-x-2 h-48 px-2">
          <div class="flex-1 flex flex-col items-center">
            <div class="w-full bg-blue-500 rounded-t" style="height:30px"></div>
            <span class="text-xs text-gray-500 mt-1">9</span>
          </div>
          <div class="flex-1 flex flex-col items-center">
            <div class="w-full bg-blue-500 rounded-t" style="height:75px"></div>
            <span class="text-xs text-gray-500 mt-1">10</span>
          </div>
          <div class="flex-1 flex flex-col items-center">
            <div class="w-full bg-blue-500 rounded-t" style="height:90px"></div>
            <span class="text-xs text-gray-500 mt-1">11</span>
          </div>
          <div class="flex-1 flex flex-col items-center">
            <div class="w-full bg-blue-500 rounded-t" style="height:40px"></div>
            <span class="text-xs text-gray-500 mt-1">12</span>
          </div>
          <div class="flex-1 flex flex-col items-center">
            <div class="w-full bg-blue-500 rounded-t" style="height:55px"></div>
            <span class="text-xs text-gray-500 mt-1">13</span>
          </div>
          <div class="flex-1 flex flex-col items-center">
            <div class="w-full bg-blue-500 rounded-t" style="height:85px"></div>
            <span class="text-xs text-gray-500 mt-1">14</span>
          </div>
          <div class="flex-1 flex flex-col items-center">
            <div class="w-full bg-blue-500 rounded-t" style="height:100px"></div>
            <span class="text-xs text-gray-500 mt-1">15</span>
          </div>
          <div class="flex-1 flex flex-col items-center">
            <div class="w-full bg-blue-500 rounded-t" style="height:70px"></div>
            <span class="text-xs text-gray-500 mt-1">16</span>
          </div>
          <div class="flex-1 flex flex-col items-center">
            <div class="w-full bg-blue-500 rounded-t" style="height:50px"></div>
            <span class="text-xs text-gray-500 mt-1">17</span>
          </div>
          <div class="flex-1 flex flex-col items-center">
            <div class="w-full bg-blue-500 rounded-t" style="height:25px"></div>
            <span class="text-xs text-gray-500 mt-1">18</span>
          </div>
          <div class="flex-1 flex flex-col items-center">
            <div class="w-full bg-blue-500 rounded-t" style="height:10px"></div>
            <span class="text-xs text-gray-500 mt-1">19</span>
          </div>
        </div>
      </div>

      <!-- 業種別案件化率 -->
      <div class="bg-white rounded-lg border border-gray-200 p-4">
        <h2 class="text-sm font-bold text-gray-700 mb-3">業種別案件化率</h2>
        <div class="flex items-center justify-center h-48">
          <div class="relative w-40 h-40">
            <svg viewBox="0 0 36 36" class="w-40 h-40">
              <circle cx="18" cy="18" r="15.9" fill="none" stroke="#3b82f6" stroke-width="3" stroke-dasharray="35 65" stroke-dashoffset="25"></circle>
              <circle cx="18" cy="18" r="15.9" fill="none" stroke="#10b981" stroke-width="3" stroke-dasharray="25 75" stroke-dashoffset="-10"></circle>
              <circle cx="18" cy="18" r="15.9" fill="none" stroke="#f59e0b" stroke-width="3" stroke-dasharray="20 80" stroke-dashoffset="-35"></circle>
              <circle cx="18" cy="18" r="15.9" fill="none" stroke="#ef4444" stroke-width="3" stroke-dasharray="20 80" stroke-dashoffset="-55"></circle>
            </svg>
          </div>
          <div class="ml-6 space-y-2 text-sm">
            <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-blue-500 mr-2"></span>飲食 4.2%</div>
            <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-green-500 mr-2"></span>製造 3.8%</div>
            <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-yellow-500 mr-2"></span>小売 2.5%</div>
            <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-red-500 mr-2"></span>IT 5.1%</div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
</body>
</html>
