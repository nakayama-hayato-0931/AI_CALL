<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>架電画面</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<div class="flex h-screen">
  <!-- サイドバー -->
  <aside class="w-56 bg-white border-r border-gray-200 flex flex-col">
    <div class="h-14 flex items-center px-4 border-b border-gray-200">
      <div class="w-7 h-7 bg-blue-600 rounded-full flex items-center justify-center mr-2">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
      </div>
      <span class="font-bold text-sm text-gray-800">AI CallCenter</span>
    </div>
    <nav class="flex-1 py-4">
      <a class="flex items-center px-4 py-2.5 text-sm text-gray-600 hover:bg-gray-50"><span class="mr-3">📊</span>ダッシュボード</a>
      <a class="flex items-center px-4 py-2.5 text-sm bg-blue-50 text-blue-700 border-r-2 border-blue-700"><span class="mr-3">📞</span>架電画面</a>
      <a class="flex items-center px-4 py-2.5 text-sm text-gray-600"><span class="mr-3">🔔</span>リコール管理</a>
      <a class="flex items-center px-4 py-2.5 text-sm text-gray-600"><span class="mr-3">📁</span>案件管理</a>
      <a class="flex items-center px-4 py-2.5 text-sm text-gray-600"><span class="mr-3">📋</span>通話ログ</a>
      <a class="flex items-center px-4 py-2.5 text-sm text-gray-600"><span class="mr-3">📥</span>CSVインポート</a>
    </nav>
    <div class="border-t border-gray-200 p-4">
      <p class="text-sm font-medium text-gray-800">田中 太郎</p>
      <p class="text-xs text-gray-500">operator</p>
    </div>
  </aside>

  <!-- メイン -->
  <main class="flex-1 overflow-auto p-6">
    <h1 class="text-lg font-bold text-gray-800 mb-4">架電画面</h1>
    <div class="grid grid-cols-3 gap-4">
      <!-- 左: 企業情報 -->
      <div class="bg-white rounded-lg border border-gray-200 p-4">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-sm font-bold text-gray-700">企業情報</h2>
          <span class="text-xs px-2 py-0.5 bg-green-100 text-green-700 rounded">ゴールデンタイム</span>
        </div>
        <div class="space-y-2.5 text-sm">
          <div><span class="text-gray-500">企業名: </span><span class="font-semibold">株式会社レストランA</span></div>
          <div><span class="text-gray-500">電話番号: </span><span class="font-medium">03-1234-5001</span></div>
          <div><span class="text-gray-500">業種: </span><span>飲食</span></div>
          <div><span class="text-gray-500">地域: </span><span>東京</span></div>
        </div>

        <div class="mt-4 pt-3 border-t border-gray-100">
          <h3 class="text-xs font-bold text-gray-600 mb-2">前回履歴</h3>
          <div class="space-y-1.5">
            <div class="text-xs bg-gray-50 rounded p-2">
              <div class="flex justify-between">
                <span class="text-gray-500">2024/03/08 14:30</span>
                <span class="font-medium text-yellow-600">RECALL</span>
              </div>
              <p class="text-gray-600 mt-1">担当者不在。15時以降に再架電希望とのこと。</p>
            </div>
            <div class="text-xs bg-gray-50 rounded p-2">
              <div class="flex justify-between">
                <span class="text-gray-500">2024/03/07 10:15</span>
                <span class="font-medium text-gray-500">NO_ANSWER</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 中央: 架電操作 -->
      <div class="bg-white rounded-lg border border-gray-200 p-4 flex flex-col items-center justify-center">
        <p class="text-2xl font-bold text-gray-800 mb-1">03-1234-5001</p>
        <p class="text-sm text-gray-500 mb-8">株式会社レストランA</p>
        <button class="w-36 h-36 rounded-full bg-green-500 text-white text-xl font-bold shadow-lg flex items-center justify-center hover:bg-green-600 transition-all transform hover:scale-105">
          <div class="text-center">
            <svg class="w-10 h-10 mx-auto mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
            架電開始
          </div>
        </button>
        <p class="mt-3 text-xs text-gray-400">Zoom Phoneが自動起動します</p>
        <button class="mt-4 text-sm text-gray-500 hover:text-gray-700 underline">スキップ</button>
      </div>

      <!-- 右: 結果入力 -->
      <div class="bg-white rounded-lg border border-gray-200 p-4">
        <h2 class="text-sm font-bold text-gray-700 mb-3">結果入力</h2>
        <div class="grid grid-cols-2 gap-2 mb-4">
          <button class="py-2 px-3 rounded text-sm font-medium text-white bg-gray-500 opacity-60">不通</button>
          <button class="py-2 px-3 rounded text-sm font-medium text-white bg-red-500 opacity-60">NG</button>
          <button class="py-2 px-3 rounded text-sm font-medium text-white bg-yellow-500 ring-2 ring-offset-1 ring-gray-400 scale-105">リコール</button>
          <button class="py-2 px-3 rounded text-sm font-medium text-white bg-blue-500 opacity-60">興味あり</button>
          <button class="py-2 px-3 rounded text-sm font-medium text-white bg-green-500 opacity-60 col-span-2">案件化</button>
        </div>
        <div class="space-y-2 mb-4">
          <label class="flex items-center text-sm"><input type="checkbox" checked class="mr-2 accent-blue-600" />有効接続</label>
          <label class="flex items-center text-sm"><input type="checkbox" checked class="mr-2 accent-blue-600" />担当者接続</label>
        </div>
        <div class="mb-4">
          <label class="block text-xs font-medium text-gray-600 mb-1">リコール日時 <span class="text-red-500">*</span></label>
          <input type="datetime-local" value="2024-03-09T15:00" class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm" />
        </div>
        <div class="mb-4">
          <label class="block text-xs font-medium text-gray-600 mb-1">メモ</label>
          <textarea rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm resize-none" placeholder="通話メモを入力...">人事部の山田様と通話。来週月曜に再度ご連絡する約束。</textarea>
        </div>
        <button class="w-full bg-blue-600 text-white py-2.5 rounded-md text-sm font-semibold hover:bg-blue-700 transition">保存して次へ</button>
      </div>
    </div>
  </main>
</div>
</body>
</html>
